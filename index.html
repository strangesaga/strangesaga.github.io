<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSMIC CUPCAKE | SYSTEM OS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #050000;
            color: #d3d3d3;
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            user-select: none;
        }

        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 999;
            box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.1);
        }

        .vhs-flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 0.85; }
            100% { opacity: 1; }
        }

        /* === A NOVA LOGO EM IMAGEM === */
        .logo-image {
            max-width: 80%; /* Garante que não passe da tela */
            width: 450px;   /* Tamanho ideal para desktops baseado no seu 1200x1000 */
            height: auto;
            margin-bottom: 50px;
            /* Glitch Cromático projetado direto na sua arte transparente */
            filter: drop-shadow(4px 0px 0px rgba(255, 42, 75, 0.8)) 
                    drop-shadow(-4px 0px 0px rgba(0, 229, 255, 0.8));
            animation: breatheLogo 4s ease-in-out infinite, glitchLogo 3s infinite;
            position: relative;
            z-index: 10;
        }

        /* Animação de pulsar e tremer */
        @keyframes breatheLogo {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        @keyframes glitchLogo {
            0%, 96%, 98%, 100% { filter: drop-shadow(4px 0px 0px rgba(255, 42, 75, 0.8)) drop-shadow(-4px 0px 0px rgba(0, 229, 255, 0.8)); }
            97% { filter: drop-shadow(-6px 2px 0px rgba(0, 229, 255, 1)) drop-shadow(6px -2px 0px rgba(255, 42, 75, 1)); }
            99% { filter: drop-shadow(6px -2px 0px rgba(255, 42, 75, 1)) drop-shadow(-6px 2px 0px rgba(0, 229, 255, 1)); }
        }

        /* Ajuste para telas de Celular */
        @media (max-width: 600px) {
            .logo-image { width: 85%; }
        }

        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .menu-item {
            font-size: 2.5rem;
            color: #d3d3d3;
            text-decoration: none;
            text-transform: uppercase;
            position: relative;
            transition: all 0.1s;
            cursor: pointer;
            padding: 5px 20px;
        }

        .menu-item::before {
            content: '>';
            position: absolute;
            left: -30px;
            color: #ff2a4b;
            opacity: 0;
            text-shadow: 0px 0px 10px #ff2a4b;
            animation: blinkCursor 0.5s infinite;
        }

        @keyframes blinkCursor {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        .menu-item:hover {
            color: #ffffff;
            text-shadow: 0px 0px 15px rgba(255, 42, 75, 0.8);
            transform: scale(1.05);
        }

        .menu-item:hover::before {
            opacity: 1; 
        }

        .footer-controls {
            position: absolute;
            bottom: 30px;
            font-size: 1.2rem;
            color: #555;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .footer-controls span {
            color: #ff2a4b;
        }
    </style>
</head>
<body class="vhs-flicker">

    <div class="crt-overlay"></div>

    <img src="logo-pixel.png" alt="Cosmic Cupcake Logo" class="logo-image">

    <nav class="main-menu">
        <a href="COLOQUE_SEU_LINK_DO_ITCH_AQUI" target="_blank" class="menu-item">Projetos & Jogos</a>
        <a href="#" class="menu-item">Registros (Devlog)</a>
        <a href="COLOQUE_SEU_LINK_DO_YOUTUBE_AQUI" target="_blank" class="menu-item">Verifique a Fita (Canal)</a>
        <a href="mailto:seuemail@gmail.com" class="menu-item">Contato de Emergência</a>
    </nav>

    <div class="footer-controls">
        SISTEMA ONLINE - USE O <span>MOUSE</span> PARA INSPECIONAR
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playHoverSound() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume(ss);
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(150, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1); 
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        const menuItems = document.querySelectorAll('.menu-item');
        menuItems.forEach(item => {
            item.addEventListener('mouseenter', playHoverSound);
        });
    </script>
</body>
</html>
