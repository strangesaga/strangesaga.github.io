<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSMIC CUPCAKE | SYSTEM OS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           LUNA JUICE: CRIMSON VHS AESTHETIC
        ========================================= */
        body {
            background-color: #050000;
            color: #d3d3d3;
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Esconde barras de rolagem */
            user-select: none;
        }

        /* Efeito de Tubo de TV Antiga (Vignette e Scanlines) */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 999;
            box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.1);
        }

        /* Fita Corrompida (Tremor da Tela) */
        .vhs-flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 0.85; }
            100% { opacity: 1; }
        }

        /* O Título Gigante no Topo */
        .game-title {
            font-size: 5rem;
            color: #ff2a4b;
            text-align: center;
            margin-bottom: 50px;
            letter-spacing: 5px;
            text-shadow: 
                3px 3px 0px rgba(0, 0, 0, 1),
                -2px -2px 0px rgba(0, 229, 255, 0.8), /* Aberração Cromática Ciana */
                0px 0px 20px rgba(255, 42, 75, 0.6);
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 96%, 98%, 100% { transform: translate(0, 0); text-shadow: 3px 3px 0px rgba(0, 0, 0, 1), -2px -2px 0px rgba(0, 229, 255, 0.8), 0px 0px 20px rgba(255, 42, 75, 0.6); }
            97% { transform: translate(-5px, 2px); text-shadow: -3px 0px 0px rgba(0, 229, 255, 1), 2px 2px 0px rgba(255, 42, 75, 1); }
            99% { transform: translate(5px, -2px); text-shadow: 3px 0px 0px rgba(255, 42, 75, 1), -2px -2px 0px rgba(0, 229, 255, 1); }
        }

        /* O Menu Principal */
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .menu-item {
            font-size: 2.5rem;
            color: #d3d3d3;
            text-decoration: none;
            text-transform: uppercase;
            position: relative;
            transition: all 0.1s;
            cursor: pointer;
            padding: 5px 20px;
        }

        /* O Cursor (Fica invisível até passar o mouse) */
        .menu-item::before {
            content: '>';
            position: absolute;
            left: -30px;
            color: #ff2a4b;
            opacity: 0;
            text-shadow: 0px 0px 10px #ff2a4b;
            animation: blinkCursor 0.5s infinite;
        }

        @keyframes blinkCursor {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* Efeito de Seleção (Hover) */
        .menu-item:hover {
            color: #ffffff;
            text-shadow: 0px 0px 15px rgba(255, 42, 75, 0.8);
            transform: scale(1.05);
        }

        .menu-item:hover::before {
            opacity: 1; /* Mostra o cursor */
        }

        /* Dica de Controles no Rodapé */
        .footer-controls {
            position: absolute;
            bottom: 30px;
            font-size: 1.2rem;
            color: #555;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .footer-controls span {
            color: #ff2a4b;
        }
    </style>
</head>
<body class="vhs-flicker">

    <div class="crt-overlay"></div>

    <h1 class="game-title">COSMIC CUPCAKE</h1>

    <nav class="main-menu">
        <a href="COLOQUE_SEU_LINK_DO_ITCH_AQUI" target="_blank" class="menu-item">Projetos & Jogos</a>
        <a href="#" class="menu-item">Registros (Devlog)</a>
        <a href="COLOQUE_SEU_LINK_DO_YOUTUBE_AQUI" target="_blank" class="menu-item">Verifique a Fita (Canal)</a>
        <a href="mailto:seuemail@gmail.com" class="menu-item">Contato de Emergência</a>
    </nav>

    <div class="footer-controls">
        SISTEMA ONLINE - USE O <span>MOUSE</span> PARA INSPECIONAR
    </div>

    <script>
        // Cria o sintetizador de som retrô do zero
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playHoverSound() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // Cria um "Beep" grave
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'square'; // Tipo de onda 8-bits
            osc.frequency.setValueAtTime(150, audioCtx.currentTime); // Frequência baixa
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1); // Cai rápido
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Aplica o som a todos os itens do menu
        const menuItems = document.querySelectorAll('.menu-item');
        menuItems.forEach(item => {
            item.addEventListener('mouseenter', playHoverSound);
        });
    </script>
</body>
</html>
